<!DOCTYPE html>
<html>
<head>
  <title>MVP – Case Intelligence Engine</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      padding: 20px;
    }

    .chat-box {
      max-width: 900px;
      margin: auto;
    }

    input {
      width: 76%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-right: 6px;
    }

    button {
      padding: 10px 12px;
      border-radius: 6px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      color: #0b1220;
      font-weight: 600;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      border-left: 4px solid #38bdf8;
    }

    .card.red {
      border-left: 4px solid #fb7185;
    }

    .card.yellow {
      border-left: 4px solid #fbbf24;
    }

    .meta {
      margin-top: 7px;
      line-height: 1.25rem;
    }

    .small {
      opacity: 0.85;
      font-size: 0.92rem;
    }

    textarea {
      width: 100%;
      height: 140px;
      margin-top: 8px;
      border-radius: 8px;
      padding: 10px;
      border: none;
      resize: vertical;
      font-family: Arial, sans-serif;
      font-size: 0.98rem;
      color: #0b1220;
    }

    hr {
      border: 1px solid #334155;
      margin: 12px 0;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #0b1220;
      border: 1px solid #334155;
      font-size: 0.85rem;
      margin-right: 6px;
      margin-top: 6px;
    }

    .hint {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .optTitle {
      margin-top: 0;
      margin-bottom: 6px;
      font-size: 1.02rem;
    }

    .optWrap {
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      margin-top: 12px;
    }

    .optWrap textarea {
      background: #e2e8f0;
    }

    .btnRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btnSecondary {
      background: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="chat-box">
    <h2>🧠 MVP – Case Intelligence Engine</h2>

    <div class="hint">
      Paste case notes / escalation text. MVP will parse Ticket/Serial, summarize, warn on QA risks, and generate Top 3 copy/paste replies.
    </div>

    <div style="margin-top:10px;">
      <input id="userInput" placeholder="Example: Case #22336 | Serial: PF4RWEMX | Customer not responding after logs request..." />
      <button onclick="sendMessage()">Analyze</button>
    </div>

    <div id="output"></div>
  </div>

<script>
/* =========================
   🧠 MULTI-FIELD PARSER
   ========================= */
function parseCaseInput(text){
  const parsed = {
    ticketId: "Not found",
    serial: "Not found",
    notes: text
  };

  const ticketMatch = text.match(/(ticket|case)[#: ]*\s*([a-zA-Z0-9-]+)/i);
  if(ticketMatch) parsed.ticketId = ticketMatch[2];

  const serialMatch = text.match(/(serial|sn)[#: ]*\s*([a-zA-Z0-9]+)/i);
  if(serialMatch) parsed.serial = serialMatch[2];

  if(parsed.ticketId !== "Not found" || parsed.serial !== "Not found"){
    parsed.notes = text
      .replace(/(ticket|case)[#: ]*\s*[a-zA-Z0-9-]+/ig, "")
      .replace(/(serial|sn)[#: ]*\s*[a-zA-Z0-9]+/ig, "")
      .trim();
  }

  return parsed;
}

/* =========================
   🧠 CASE SUMMARY ENGINE
   ========================= */
function generateCaseSummary(text){
  const input = (text || "").toLowerCase();

  let summary = {
    issue: "General support investigation",
    status: "Active",
    customerState: "Engaged",
    blocker: "None clearly identified",
    nextStep: "Continue troubleshooting",
    tags: []
  };

  const signals = {
    noResponse: input.includes("no response") || input.includes("not responding") || input.includes("unresponsive"),
    logsMissing: input.includes("log") || input.includes("diagnostic") || input.includes("collect logs"),
    closureIntent: input.includes("close") || input.includes("closure") || input.includes("closing"),
    thirdParty: input.includes("teams") || input.includes("zoom") || input.includes("google"),
    hardware: input.includes("power") || input.includes("boot") || input.includes("no power") || input.includes("unresponsive") || input.includes("hardware"),
    rma: input.includes("replace") || input.includes("replacement") || input.includes("rma") || input.includes("swap")
  };

  if(signals.thirdParty){
    summary.issue = "Third-party platform related issue";
    summary.tags.push("Third-Party");
  } else if(signals.hardware){
    summary.issue = "Device hardware or functionality issue";
    summary.tags.push("Hardware");
  } else if(signals.noResponse){
    summary.issue = "Customer unresponsive after request";
    summary.tags.push("Customer Delay");
  }

  if(signals.noResponse){
    summary.status = "Waiting on Customer";
    summary.customerState = "Unresponsive";
  }

  if(signals.closureIntent){
    summary.status = "Pending Closure";
  }

  if(signals.logsMissing){
    summary.blocker = "Missing logs or diagnostic data";
  }

  if(signals.noResponse){
    summary.blocker = "No customer response";
  }

  if(signals.thirdParty){
    summary.blocker = "Dependency on external platform/vendor";
  }

  if(summary.status === "Waiting on Customer"){
    summary.nextStep = "Send follow-up or closure warning";
  }

  if(summary.status === "Pending Closure"){
    summary.nextStep = "Confirm closure with customer";
  }

  if(signals.thirdParty){
    summary.nextStep = "Validate scope and direct customer to vendor support if needed";
  }

  if(signals.rma){
    if(!summary.tags.includes("RMA Risk")) summary.tags.push("RMA Risk");
    summary.nextStep = "Complete troubleshooting and escalate internally for review if needed";
  }

  return summary;
}

/* =========================
   🧠 NEXT BEST ACTION ENGINE
   ========================= */
function getNextBestAction(summary){
  let action = "Continue troubleshooting";

  if(summary.status === "Waiting on Customer"){
    action = "Send follow-up to customer";
  }
  if(summary.status === "Pending Closure"){
    action = "Confirm closure before closing";
  }
  if(summary.tags.includes("Third-Party")){
    action = "Confirm scope; guide customer to vendor support";
  }
  if(summary.tags.includes("Hardware")){
    action = "Validate device state; collect evidence/logs where possible";
  }
  if(summary.tags.includes("RMA Risk")){
    action = "Do not promise replacement; escalate internally after troubleshooting";
  }

  return action;
}

/* =========================
   ⚠️ QA WARNING ENGINE
   ========================= */
function getQAWarnings(summary, parsed){
  let warnings = [];
  let severity = "yellow";

  if(parsed.ticketId === "Not found") warnings.push("⚠️ Missing Ticket/Case ID");
  if(parsed.serial === "Not found") warnings.push("⚠️ Missing Serial Number");

  if((summary.blocker || "").toLowerCase().includes("log")){
    warnings.push("⚠️ Logs not collected – troubleshooting may be incomplete");
  }

  if(summary.status === "Waiting on Customer"){
    warnings.push("⚠️ Follow-up cadence risk – ensure documented follow-ups before closure");
  }

  if(summary.status === "Pending Closure" && summary.customerState === "Unresponsive"){
    warnings.push("⚠️ Closure risk – confirm customer intent / final attempt before closing");
  }

  if(summary.tags.includes("RMA Risk")){
    warnings.push("🚫 Do NOT promise replacement – RMA decisions are handled by escalation/Customer Care teams");
    severity = "red";
  }

  if(summary.tags.includes("Third-Party")){
    warnings.push("⚠️ Third-party boundary – confirm scope; Lenovo cannot coordinate directly with vendors on customer’s behalf");
  }

  return { warnings, severity };
}

/* =========================
   📧 REPLY TEMPLATES (unified + customer friendly)
   ========================= */
function replyHeaderBlock(parsed){
  const caseLine = parsed.ticketId !== "Not found" ? `Case/Ticket: ${parsed.ticketId}\n` : "";
  const serialLine = parsed.serial !== "Not found" ? `Serial: ${parsed.serial}\n` : "";
  return (caseLine || serialLine) ? `${caseLine}${serialLine}\n` : "";
}

function tplFollowUpWaiting(summary, parsed){
  const header = replyHeaderBlock(parsed);
  return `Hello,\n\n${header}I hope you're doing well. I’m following up on your case—at this time we’re still waiting on the requested information so we can continue troubleshooting.\n\nWhen you have a moment, please share the requested details (and logs if applicable). Once received, we’ll proceed right away.\n\nIf we don’t hear back, we may need to close the case for now, but we can reopen and continue as soon as you reply.\n\nThank you,\nLenovo Support`;
}

function tplClosureConfirm(summary, parsed){
  const header = replyHeaderBlock(parsed);
  return `Hello,\n\n${header}I’m checking in on your case. Based on the latest update, it appears the issue may be resolved.\n\nPlease confirm whether everything is working as expected. If we do not receive a response, we will proceed with closing the case.\n\nIf you still need assistance, reply to this message and we’ll continue troubleshooting.\n\nThank you,\nLenovo Support`;
}

function tplLogsRequest(summary, parsed){
  const header = replyHeaderBlock(parsed);
  return `Hello,\n\n${header}Thank you for reaching out. To proceed with troubleshooting, we’ll need the requested logs/diagnostics.\n\nPlease collect and share the logs at your earliest convenience. Once received, we’ll review and provide the next steps.\n\nThank you,\nLenovo Support`;
}

function tplThirdPartyBoundary(summary, parsed){
  const header = replyHeaderBlock(parsed);
  return `Hello,\n\n${header}Thank you for the details. Based on our review, this issue appears to be related to a third-party platform.\n\nPlease contact the vendor’s support team for further assistance with the platform-specific issue. Lenovo is not able to coordinate directly with third-party support providers on a customer’s behalf.\n\nIf you have any Lenovo-specific findings or changes after vendor troubleshooting, reply here and we’ll continue assisting.\n\nThank you,\nLenovo Support`;
}

function tplRMAExpectations(summary, parsed){
  const header = replyHeaderBlock(parsed);
  return `Hello,\n\n${header}I understand the request for a replacement and how disruptive this issue can be.\n\nAt this stage, we need to complete the required troubleshooting steps and review the results. If troubleshooting indicates that additional service action may be needed, we can escalate the case internally for the appropriate team to review available service options.\n\nIn the meantime, please share any requested details/logs so we can move forward as quickly as possible.\n\nThank you,\nLenovo Support`;
}

function tplGeneralUpdate(summary, parsed){
  const header = replyHeaderBlock(parsed);
  return `Hello,\n\n${header}Thank you for reaching out. We are reviewing your issue and proceeding with troubleshooting steps.\n\nIf you can share any additional details (exact symptoms, timing, error messages, or recent changes), that will help us assist more efficiently.\n\nThank you,\nLenovo Support`;
}

/* =========================
   🛡️ REPLY GUARDRAILS (prevent risky language)
   ========================= */
function applyReplyGuardrails(reply, summary){
  let safe = reply;

  const replacements = [
    { pattern: /\bwe will replace\b/ig, replaceWith: "we will continue troubleshooting and escalate internally if needed" },
    { pattern: /\bwe(')?ll replace\b/ig, replaceWith: "we’ll continue troubleshooting and escalate internally if needed" },
    { pattern: /\bwe will send (a )?replacement\b/ig, replaceWith: "we will continue troubleshooting and escalate internally for review if needed" },
    { pattern: /\bwe(')?ll send (a )?replacement\b/ig, replaceWith: "we’ll continue troubleshooting and escalate internally for review if needed" },
    { pattern: /\bship(ping)? (you )?(a )?(new|replacement) unit\b/ig, replaceWith: "review service options after troubleshooting is complete" },
    { pattern: /\b(rma|swap)\b/ig, replaceWith: "service review" }
  ];

  replacements.forEach(r => {
    safe = safe.replace(r.pattern, r.replaceWith);
  });

  // If RMA risk detected, append a consistent “no promises” note
  if(summary.tags && summary.tags.includes("RMA Risk")){
    const guardrailNote =
`\n\nNote: We can’t commit to a replacement in advance. If troubleshooting indicates additional service action may be needed, the request is reviewed and handled by the appropriate escalation/Customer Care team after required troubleshooting steps are completed.`;
    if(!safe.toLowerCase().includes("can’t commit to a replacement")){
      safe += guardrailNote;
    }
  }

  return safe;
}

/* =========================
   🥇 TOP 3 REPLY OPTIONS (rank + pick)
   ========================= */
function generateTop3ReplyOptions(summary, parsed){
  const candidates = [];

  // Helper to add unique candidates
  function add(title, body, score){
    candidates.push({ title, body, score });
  }

  // Scenario-driven scoring
  const hasLogsMissing = (summary.blocker || "").toLowerCase().includes("log");
  const isWaiting = summary.status === "Waiting on Customer";
  const isClosure = summary.status === "Pending Closure";
  const isThirdParty = summary.tags.includes("Third-Party");
  const isRmaRisk = summary.tags.includes("RMA Risk");

  // Primary templates
  if(isWaiting) add("Follow-up (Waiting on Customer)", tplFollowUpWaiting(summary, parsed), 100);
  if(isClosure) add("Closure Confirmation", tplClosureConfirm(summary, parsed), 100);
  if(hasLogsMissing) add("Request Logs / Diagnostics", tplLogsRequest(summary, parsed), 95);
  if(isThirdParty) add("Third-Party Boundary (Vendor Support)", tplThirdPartyBoundary(summary, parsed), 100);
  if(isRmaRisk) add("Replacement Request (Set Expectations, No Promises)", tplRMAExpectations(summary, parsed), 100);

  // Strong alternates
  if(!hasLogsMissing) add("Request Logs / Diagnostics (Optional)", tplLogsRequest(summary, parsed), 60);
  if(!isThirdParty) add("General Update (Troubleshooting in Progress)", tplGeneralUpdate(summary, parsed), 55);
  if(!isWaiting) add("Follow-up (Check-in)", tplFollowUpWaiting(summary, parsed), 50);
  if(!isClosure) add("Closure Confirmation (If Resolved)", tplClosureConfirm(summary, parsed), 35);

  // Sort, de-dupe by title, take top 3
  candidates.sort((a,b) => b.score - a.score);

  const seen = new Set();
  const top = [];
  for(const c of candidates){
    if(seen.has(c.title)) continue;
    seen.add(c.title);
    top.push(c);
    if(top.length === 3) break;
  }

  // Apply guardrails to each body
  return top.map((o) => ({
    title: o.title,
    body: applyReplyGuardrails(o.body, summary)
  }));
}

/* =========================
   📋 Copy helper
   ========================= */
async function copyTextFromTextarea(textareaId){
  const el = document.getElementById(textareaId);
  if(!el) return;

  const text = el.value;

  try {
    await navigator.clipboard.writeText(text);
    alert("Reply copied!");
    return;
  } catch (e) {
    el.select();
    document.execCommand("copy");
    alert("Reply copied!");
  }
}

/* =========================
   🧠 MAIN EXECUTION
   ========================= */
function sendMessage(){
  const input = document.getElementById("userInput").value;
  if(!input) return;

  const parsed = parseCaseInput(input);
  const summary = generateCaseSummary(parsed.notes);
  const nextAction = getNextBestAction(summary);
  const qa = getQAWarnings(summary, parsed);

  const replyOptions = generateTop3ReplyOptions(summary, parsed);

  const pills = (summary.tags || []).length
    ? summary.tags.map(t => `<span class="pill">${t}</span>`).join("")
    : `<span class="pill">No tags</span>`;

  const analysisCard = `
    <div class="card">
      <h3>📄 Case Overview</h3>
      <div class="meta"><b>Ticket/Case ID:</b> ${parsed.ticketId}</div>
      <div class="meta"><b>Serial Number:</b> ${parsed.serial}</div>
      <div class="meta small"><b>Extracted Notes:</b> ${parsed.notes ? "Yes" : "No"}</div>

      <hr>

      <h3>🧠 Case Analysis</h3>
      <div class="meta"><b>Issue:</b> ${summary.issue}</div>
      <div class="meta"><b>Status:</b> ${summary.status}</div>
      <div class="meta"><b>Customer State:</b> ${summary.customerState}</div>
      <div class="meta"><b>Blocker:</b> ${summary.blocker}</div>
      <div class="meta"><b>Next Step:</b> ${summary.nextStep}</div>
      <div class="meta"><b>Recommended Action:</b> ${nextAction}</div>

      <div class="row">${pills}</div>
    </div>
  `;

  const warningsCard = (qa.warnings && qa.warnings.length)
    ? `
      <div class="card ${qa.severity}">
        <h3>${qa.severity === "red" ? "🚫 QA / Governance Warnings" : "⚠️ QA Warnings"}</h3>
        ${qa.warnings.map(w => `<div class="meta">${w}</div>`).join("")}
      </div>
    `
    : "";

  const repliesCard = `
    <div class="card">
      <h3>📧 Suggested Customer Replies (Top 3)</h3>
      <div class="meta small">Choose the best match and copy/paste. Guardrails are applied automatically.</div>

      ${replyOptions.map((opt, idx) => `
        <div class="optWrap">
          <div class="optTitle"><b>Option ${idx+1}:</b> ${opt.title}</div>
          <textarea id="replyOpt${idx}">${opt.body}</textarea>
          <div class="btnRow">
            <button onclick="copyTextFromTextarea('replyOpt${idx}')">Copy Option ${idx+1}</button>
          </div>
        </div>
      `).join("")}
    </div>
  `;

  document.getElementById("output").innerHTML = analysisCard + warningsCard + repliesCard;
}
</script>

</body>
</html>
