<!DOCTYPE html>
<html>
<head>
<title>MVP – Case Intelligence Engine</title>

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
.chat-box{max-width:950px;margin:auto;}
input{width:75%;padding:10px;border-radius:6px;border:none;}
button{padding:10px;border:none;border-radius:6px;background:#38bdf8;font-weight:bold;}
.card{background:#1e293b;padding:15px;margin-top:15px;border-left:4px solid #38bdf8;border-radius:10px;}
textarea{width:100%;height:140px;margin-top:10px;border-radius:8px;padding:10px;background:#e2e8f0;color:black;}
.meta{margin-top:6px;}
</style>
</head>

<body>

<div class="chat-box">
<h2>🧠 MVP – Case Intelligence Engine</h2>

<input id="userInput" placeholder="Paste case notes..." />
<button onclick="runMVP()">Analyze</button>

<div id="output"></div>
</div>

<script>

// =========================
// 🧠 PARSER (Email + Ticket + Serial)
// =========================
function parseInput(text){
  return {
    ticket: (text.match(/(case|ticket)[#: ]*([a-zA-Z0-9]+)/i)||[])[2]||"N/A",
    serial: (text.match(/(serial|sn)[#: ]*([a-zA-Z0-9]+)/i)||[])[2]||"N/A",
    email: (text.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i)||[])[0]||"N/A",
    notes: text
  }
}

// =========================
// 🧠 SUMMARY
// =========================
function analyze(text){
  const t = text.toLowerCase();
  return {
    waiting: t.includes("not responding"),
    logs: t.includes("log"),
    hardware: t.includes("power")||t.includes("boot"),
    third: t.includes("teams")||t.includes("zoom"),
    rma: t.includes("replace")
  }
}

// =========================
// 📋 CUSTOMER CHECKLIST
// =========================
function checklist(p,s){
 let list = [
 "✔ Confirm serial number",
 "✔ Confirm customer email"
 ];

 if(s.logs){
  list.push("🟡 Request logs");
  list.push("🟡 Ask for timestamp");
 }

 if(s.hardware){
  list.push("🟡 Ask for photos/video");
  list.push("🟡 Confirm power behavior");
 }

 if(s.third){
  list.push("🟡 Confirm platform (Teams/Zoom)");
 }

 return list;
}

// =========================
// 🧭 GUIDED ACTIONS
// =========================
function actions(s){
 let a=[];

 if(s.logs) a.push("Request logs and confirm access");
 if(s.hardware) a.push("Check power, cables, reboot");
 if(s.third) a.push("Isolate app vs system issue");
 if(s.waiting) a.push("Send follow-up and set closure expectation");
 if(s.rma) a.push("DO NOT promise replacement");

 if(a.length===0){
  a.push("Collect more info and troubleshoot step by step");
 }

 return a;
}

// =========================
// 📧 REPLIES
// =========================
function replies(s){
 return [
 "Hello,\n\nWe are reviewing your issue and will continue troubleshooting. Please provide logs if available.\n\nThank you.",
 "Hello,\n\nFollowing up on your case. Please provide the requested details so we can proceed.\n\nThank you.",
 "Hello,\n\nWe recommend continuing troubleshooting steps. We can escalate internally if needed after review.\n\nThank you."
 ];
}

// =========================
// 📝 CASE NOTE GENERATOR
// =========================
function caseNote(p,s){
 return `
=== PSSC CASE NOTE ===

Case: ${p.ticket}
Serial: ${p.serial}
Email: ${p.email}

Issue:
${s.hardware?"Hardware issue":s.third?"Third-party issue":"General issue"}

Status:
${s.waiting?"Waiting on Customer":"Active"}

Actions Taken:
• Initial assessment completed
• Awaiting logs or further info

Next Step:
Continue troubleshooting / request info

=====================
`;
}

// =========================
// 🚀 MAIN
// =========================
function runMVP(){

 const input = document.getElementById("userInput").value;

 const p = parseInput(input);
 const s = analyze(input);

 const cl = checklist(p,s);
 const ac = actions(s);
 const rp = replies(s);
 const note = caseNote(p,s);

 document.getElementById("output").innerHTML = `

<div class="card">
<h3>📄 Case Overview</h3>
<div class="meta">Ticket: ${p.ticket}</div>
<div class="meta">Serial: ${p.serial}</div>
<div class="meta">Email: ${p.email}</div>
</div>

<div class="card">
<h3>📋 What I Need From Customer</h3>
${cl.map(x=>`<div class="meta">${x}</div>`).join("")}
</div>

<div class="card">
<h3>🧭 Guided Actions</h3>
${ac.map(x=>`<div class="meta">• ${x}</div>`).join("")}
</div>

<div class="card">
<h3>📧 Suggested Replies</h3>
${rp.map((r,i)=>`
<textarea>${r}</textarea>
<button onclick="navigator.clipboard.writeText(\`${r}\`)">Copy</button>
`).join("")}
</div>

<div class="card">
<h3>📝 Case Notes</h3>
<textarea>${note}</textarea>
<button onclick="navigator.clipboard.writeText(\`${note}\`)">Copy Notes</button>
</div>

`;

}

</script>

</body>
</html>
