<!DOCTYPE html>
<html>
<head>
  <title>MVP – Minimum Viable Pal</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .chat-box {
      max-width: 750px;
      margin: auto;
    }

    input {
      width: 75%;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 5px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
    }

    .suggestCard {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      border-left: 4px solid #38bdf8;
    }

    .meta {
      margin-top: 5px;
    }

    hr {
      border: 1px solid #334155;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div class="chat-box">
  <h2>🧠 MVP – Case Intelligence Engine</h2>

  <input id="userInput" placeholder="Paste case, escalation, or notes here..." />
  <button onclick="sendMessage()">Analyze</button>

  <div id="suggestions"></div>
</div>

<script>

// =========================
// 🧠 MULTI-FIELD PARSER
// =========================

function parseCaseInput(text){

  const parsed = {
    ticketId: "Not found",
    serial: "Not found",
    notes: text
  };

  // Ticket / Case
  const ticketMatch = text.match(/(ticket|case)[#: ]*\s*([a-zA-Z0-9]+)/i);
  if(ticketMatch){
    parsed.ticketId = ticketMatch[2];
  }

  // Serial Number
  const serialMatch = text.match(/(serial|sn)[#: ]*\s*([a-zA-Z0-9]+)/i);
  if(serialMatch){
    parsed.serial = serialMatch[2];
  }

  // Clean notes if structured input found
  if(parsed.ticketId !== "Not found" || parsed.serial !== "Not found"){
    parsed.notes = text
      .replace(/(ticket|case)[#: ]*\s*[a-zA-Z0-9]+/ig, "")
      .replace(/(serial|sn)[#: ]*\s*[a-zA-Z0-9]+/ig, "")
      .trim();
  }

  return parsed;
}


// =========================
// 🧠 CASE SUMMARY ENGINE
// =========================

function generateCaseSummary(text){

  const input = text.toLowerCase();

  let summary = {
    issue: "",
    status: "Active",
    customerState: "Engaged",
    blocker: "None clearly identified",
    nextStep: "Continue troubleshooting",
    tags: []
  };

  const signals = {
    noResponse: input.includes("no response") || input.includes("not responding"),
    logsMissing: input.includes("log") || input.includes("diagnostic"),
    closureIntent: input.includes("close") || input.includes("closure"),
    thirdParty: input.includes("teams") || input.includes("zoom") || input.includes("google"),
    hardware: input.includes("power") || input.includes("boot") || input.includes("unresponsive"),
    rma: input.includes("replace") || input.includes("rma")
  };

  // Issue detection
  if(signals.thirdParty){
    summary.issue = "Third-party platform related issue";
    summary.tags.push("Third-Party");
  }
  else if(signals.hardware){
    summary.issue = "Device hardware or functionality issue";
    summary.tags.push("Hardware");
  }
  else if(signals.noResponse){
    summary.issue = "Customer unresponsive after request";
    summary.tags.push("Customer Delay");
  }
  else{
    summary.issue = "General support investigation";
  }

  // Status
  if(signals.noResponse){
    summary.status = "Waiting on Customer";
    summary.customerState = "Unresponsive";
  }

  if(signals.closureIntent){
    summary.status = "Pending Closure";
  }

  // Blocker
  if(signals.logsMissing){
    summary.blocker = "Missing logs or diagnostic data";
  }

  if(signals.noResponse){
    summary.blocker = "No customer response";
  }

  if(signals.thirdParty){
    summary.blocker = "Dependency on external platform/vendor";
  }

  // Next Step
  if(summary.status === "Waiting on Customer"){
    summary.nextStep = "Send follow-up or closure warning";
  }

  if(summary.status === "Pending Closure"){
    summary.nextStep = "Confirm closure with customer";
  }

  if(signals.thirdParty){
    summary.nextStep = "Validate scope and redirect to vendor if needed";
  }

  if(signals.rma){
    summary.nextStep = "Ensure troubleshooting completed before replacement";
    summary.tags.push("RMA Risk");
  }

  return summary;
}


// =========================
// 🧠 NEXT BEST ACTION ENGINE
// =========================

function getNextBestAction(summary){

  let action = "Continue troubleshooting";

  if(summary.status === "Waiting on Customer"){
    action = "Send follow-up to customer";
  }

  if(summary.status === "Pending Closure"){
    action = "Confirm closure with customer";
  }

  if(summary.blocker.includes("external")){
    action = "Redirect to third-party support";
  }

  if(summary.issue.includes("hardware")){
    action = "Verify device state before escalation";
  }

  return action;
}


// =========================
// 🧠 MAIN EXECUTION
// =========================

function sendMessage(){

  const input = document.getElementById("userInput").value;
  if(!input) return;

  // Step 1 — Parse fields
  const parsed = parseCaseInput(input);

  // Step 2 — Analyze notes only
  const summary = generateCaseSummary(parsed.notes);

  // Step 3 — Get action
  const nextAction = getNextBestAction(summary);

  // Step 4 — Render UI
  const summaryHTML = `
    <div class="suggestCard">

      <h3>📄 Case Overview</h3>

      <div class="meta"><b>Ticket ID:</b> ${parsed.ticketId}</div>
      <div class="meta"><b>Serial Number:</b> ${parsed.serial}</div>

      <hr>

      <h3>🧠 Case Analysis</h3>

      <div class="meta"><b>Issue:</b> ${summary.issue}</div>
      <div class="meta"><b>Status:</b> ${summary.status}</div>
      <div class="meta"><b>Customer:</b> ${summary.customerState}</div>
      <div class="meta"><b>Blocker:</b> ${summary.blocker}</div>
      <div class="meta"><b>Next Step:</b> ${summary.nextStep}</div>
      <div class="meta"><b>Recommended Action:</b> ${nextAction}</div>

      <div class="meta"><b>Tags:</b> ${summary.tags.join(", ")}</div>

    </div>
  `;

  document.getElementById("suggestions").innerHTML = summaryHTML;
}

</script>

</body>
</html>
