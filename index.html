<!DOCTYPE html>
<html>
<head>
  <title>MVP – Case Intelligence Engine</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .chat-box {
      max-width: 750px;
      margin: auto;
    }

    input {
      width: 75%;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px 12px;
      border-radius: 5px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      margin-top: 5px;
    }

    .suggestCard {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      border-left: 4px solid #38bdf8;
    }

    .meta {
      margin-top: 6px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
      border-radius: 5px;
      padding: 10px;
    }

    hr {
      border: 1px solid #334155;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div class="chat-box">
  <h2>🧠 MVP – Case Intelligence Engine</h2>

  <input id="userInput" placeholder="Paste case or escalation here..." />
  <button onclick="sendMessage()">Analyze</button>

  <div id="suggestions"></div>
</div>

<script>

// =========================
// 🧠 MULTI-FIELD PARSER
// =========================

function parseCaseInput(text){

  const parsed = {
    ticketId: "Not found",
    serial: "Not found",
    notes: text
  };

  const ticketMatch = text.match(/(ticket|case)[#: ]*\s*([a-zA-Z0-9]+)/i);
  if(ticketMatch) parsed.ticketId = ticketMatch[2];

  const serialMatch = text.match(/(serial|sn)[#: ]*\s*([a-zA-Z0-9]+)/i);
  if(serialMatch) parsed.serial = serialMatch[2];

  parsed.notes = text
    .replace(/(ticket|case)[#: ]*\s*[a-zA-Z0-9]+/ig, "")
    .replace(/(serial|sn)[#: ]*\s*[a-zA-Z0-9]+/ig, "")
    .trim();

  return parsed;
}


// =========================
// 🧠 CASE SUMMARY ENGINE
// =========================

function generateCaseSummary(text){

  const input = text.toLowerCase();

  let summary = {
    issue: "General issue",
    status: "Active",
    customerState: "Engaged",
    blocker: "None identified",
    nextStep: "Continue troubleshooting",
    tags: []
  };

  if(input.includes("not responding")){
    summary.issue = "Customer not responding";
    summary.status = "Waiting on Customer";
    summary.customerState = "Unresponsive";
    summary.blocker = "No customer response";
    summary.tags.push("Customer Delay");
  }

  if(input.includes("log")){
    summary.blocker = "Missing logs";
  }

  if(input.includes("close")){
    summary.status = "Pending Closure";
    summary.nextStep = "Confirm closure with customer";
  }

  if(input.includes("teams") || input.includes("zoom")){
    summary.issue = "Third-party platform issue";
    summary.blocker = "External dependency";
    summary.tags.push("Third-Party");
  }

  if(input.includes("power") || input.includes("boot")){
    summary.issue = "Hardware or power issue";
    summary.tags.push("Hardware");
  }

  if(input.includes("replace") || input.includes("rma")){
    summary.tags.push("RMA Risk");
  }

  return summary;
}


// =========================
// 🧠 NEXT BEST ACTION
// =========================

function getNextBestAction(summary){

  if(summary.status === "Waiting on Customer"){
    return "Send follow-up message";
  }

  if(summary.status === "Pending Closure"){
    return "Confirm closure before proceeding";
  }

  if(summary.tags.includes("Third-Party")){
    return "Redirect to vendor support";
  }

  return "Continue troubleshooting";
}


// =========================
// 🧠 CANNED REPLY ENGINE ✅
// =========================

function generateReply(summary){

  // Waiting on customer
  if(summary.status === "Waiting on Customer"){
    return `Hello,

I hope you're doing well. I wanted to follow up regarding your case. We are currently waiting on the requested information to proceed.

When you have a moment, please provide the requested details or logs so we can continue troubleshooting.

If we don’t hear back, we may proceed with closing the case, but we’re happy to continue assisting as soon as we receive your update.

Thank you,
Lenovo Support`;
  }

  // Pending closure
  if(summary.status === "Pending Closure"){
    return `Hello,

We wanted to follow up on your case. At this time, it appears that your issue may be resolved.

Please confirm if everything is working as expected. If we do not hear back, we will proceed with closing the case.

If you still need assistance, we are happy to continue working with you.

Thank you,
Lenovo Support`;
  }

  // Third-party
  if(summary.tags.includes("Third-Party")){
    return `Hello,

Based on our review, this issue appears to be related to a third-party platform.

We recommend reaching out to the appropriate vendor for further assistance. If you need help identifying the correct support channel, please let us know.

We will remain available if any Lenovo-related support is needed.

Thank you,
Lenovo Support`;
  }

  // Default troubleshooting response
  return `Hello,

Thank you for reaching out. We are currently reviewing your issue and proceeding with further troubleshooting steps.

We will keep you updated as we continue to investigate.

Please feel free to share any additional details that may help us assist you more efficiently.

Thank you,
Lenovo Support`;
}


// =========================
// 🧠 MAIN FUNCTION
// =========================

function sendMessage(){

  const input = document.getElementById("userInput").value;
  if(!input) return;

  const parsed = parseCaseInput(input);
  const summary = generateCaseSummary(parsed.notes);
  const nextAction = getNextBestAction(summary);
  const reply = generateReply(summary);

  const html = `
    <div class="suggestCard">

      <h3>📄 Case Overview</h3>
      <div class="meta"><b>Ticket:</b> ${parsed.ticketId}</div>
      <div class="meta"><b>Serial:</b> ${parsed.serial}</div>

      <hr>

      <h3>🧠 Analysis</h3>
      <div class="meta"><b>Issue:</b> ${summary.issue}</div>
      <div class="meta"><b>Status:</b> ${summary.status}</div>
      <div class="meta"><b>Blocker:</b> ${summary.blocker}</div>
      <div class="meta"><b>Next Step:</b> ${summary.nextStep}</div>
      <div class="meta"><b>Recommended:</b> ${nextAction}</div>
      <div class="meta"><b>Tags:</b> ${summary.tags.join(", ")}</div>

      <hr>

      <h3>📧 Suggested Customer Reply</h3>

      <textarea id="replyBox">${reply}</textarea>
      <button onclick="copyReply()">Copy Reply</button>

    </div>
  `;

  document.getElementById("suggestions").innerHTML = html;
}


// =========================
// 📋 COPY FUNCTION
// =========================

function copyReply(){
  const textArea = document.getElementById("replyBox");
  textArea.select();
  document.execCommand("copy");
  alert("Reply copied!");
}

</script>

</body>
</html>
``
