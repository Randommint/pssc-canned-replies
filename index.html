<!DOCTYPE html>
<html>
<head>
<title>❄️ MVP Frostbyte Assistant</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:#e2e8f0;
  padding:20px;
  animation:fadeIn 1s ease-in;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}

.chat-box{max-width:950px;margin:auto;}

input{
  width:75%;
  padding:12px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border-radius:8px;
  border:none;
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#0ea5e9;
  transform:scale(1.05);
}

.card{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-left:4px solid #38bdf8;
  border-radius:10px;
  animation:fadeIn .4s ease-in;
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 15px rgba(56,189,248,.2);
}

textarea{
  width:100%;
  height:120px;
  margin-top:10px;
  border-radius:8px;
  padding:10px;
  background:#f1f5f9;
  color:#0f172a;
}
</style>

</head>

<body>

<div class="chat-box">
<h2>❄️ Frostbyte Assistant</h2>

<input id="input" placeholder="Paste case details..." />
<button onclick="run()">Analyze</button>

<div id="output"></div>
</div>

<script>

let leadMode = false;

// ✅ SHIFT + D toggles Lead Mode
document.addEventListener("keydown", function(e){

  const active = document.activeElement;
  const typing = active.tagName==="INPUT" || active.tagName==="TEXTAREA";

  if(!typing && e.shiftKey && (e.key==="D"||e.key==="d")){
    e.preventDefault();
    leadMode = !leadMode;
    alert("Lead Mode: " + (leadMode?"ON":"OFF"));
  }

});

// =========================
// PARSER
// =========================
function parse(t){
 return {
  ticket:(t.match(/(case|ticket)[#: ]*([a-zA-Z0-9]+)/i)||[])[2]||"N/A",
  serial:(t.match(/(serial|sn)[#: ]*([a-zA-Z0-9]+)/i)||[])[2]||"N/A",
  email:(t.match(/[^\s]+@[^\s]+/i)||[])[0]||"N/A",
  text:t.toLowerCase()
 }
}

// =========================
// ANALYSIS
// =========================
function analyze(t){
 return {
  logs:t.includes("log"),
  wait:t.includes("not responding"),
  hw:t.includes("power")||t.includes("boot"),
  third:t.includes("teams")||t.includes("zoom"),
  rma:t.includes("replace")
 }
}

// =========================
// LEARNING SYSTEM
// =========================
function getScore(key){
 let data=JSON.parse(localStorage.getItem("mvp")||"{}");
 if(!data[key]) return 0;
 return data[key].used + (data[key].good*3) - data[key].bad*2;
}

function update(key,type){
 let data=JSON.parse(localStorage.getItem("mvp")||"{}");
 if(!data[key]) data[key]={used:0,good:0,bad:0};
 if(type==="use") data[key].used++;
 if(type==="good") data[key].good++;
 if(type==="bad") data[key].bad++;
 localStorage.setItem("mvp",JSON.stringify(data));
}

// =========================
// CHECKLIST
// =========================
function checklist(s){
 let c=["✔ Confirm serial number","✔ Confirm customer email"];

 if(s.logs){
  c.push("🟡 Provide logs");
  c.push("🟡 Provide timestamp");
 }
 if(s.hw){
  c.push("🟡 Provide photo/video");
 }
 if(s.third){
  c.push("🟡 Confirm platform");
 }

 return c;
}

// =========================
// GUIDANCE
// =========================
function actions(s){
 let a=[];
 if(s.logs)a.push("Request logs & confirm access");
 if(s.hw)a.push("Check power, cables, reboot");
 if(s.third)a.push("Isolate app vs system");
 if(s.wait)a.push("Send follow-up + closure expectation");
 if(s.rma)a.push("DO NOT promise replacement");

 if(a.length===0) a.push("Continue structured troubleshooting");

 return a;
}

// =========================
// CX FRIENDLY REPLIES
// =========================
function replies(s){
 return [
 {
   key:"r1",
   text:`Hello,

Thank you for reaching out — I truly understand how frustrating this issue can be.

To help us move forward, could you please share the requested logs or any additional details when you have a moment? Once we receive that, we’ll continue troubleshooting right away.

Appreciate your time,
Lenovo Support`
 },
 {
   key:"r2",
   text:`Hello,

I just wanted to follow up on your case and check if you had a chance to review our previous request.

Whenever you're ready, please send over the requested information so we can continue working toward a resolution.

Thank you again,
Lenovo Support`
 },
 {
   key:"r3",
   text:`Hello,

I understand your concern, and we’re here to help resolve this as quickly as possible.

We’ll continue troubleshooting and reviewing the findings, and if required, we can escalate internally after the necessary steps are completed.

Please share any additional details when available.

Thank you,
Lenovo Support`
 }
 ];
}

// =========================
// CASE NOTES
// =========================
function caseNote(p,s){
 return `=== PSSC CASE NOTE ===

Case: ${p.ticket}
Serial: ${p.serial}
Email: ${p.email}

Issue: ${s.hw?"Hardware":"General"}

Status: ${s.wait?"Waiting on Customer":"Active"}

Actions:
• Initial assessment complete
• Awaiting further data (logs/info)

Next Step:
Continue troubleshooting or collect missing data

============================
`;
}

// =========================
// MAIN
// =========================
function run(){

 let raw=document.getElementById("input").value;
 let p=parse(raw);
 let s=analyze(p.text);

 let rp=replies(s)
   .sort((a,b)=>getScore(b.key)-getScore(a.key));

 document.getElementById("output").innerHTML=`

<div class="card">
<h3>📄 Case Overview</h3>
<div>Case: ${p.ticket}</div>
<div>Serial: ${p.serial}</div>
<div>Email: ${p.email}</div>
</div>

<div class="card">
<h3>📋 What I Need From Customer</h3>
${checklist(s).map(x=>`<div>${x}</div>`).join("")}
</div>

<div class="card">
<h3>🧭 Guided Actions</h3>
${actions(s).map(x=>`<div>• ${x}</div>`).join("")}
</div>

<div class="card">
<h3>📧 Suggested Replies</h3>
${rp.map(r=>`
<textarea>${r.text}</textarea>
<button onclick="navigator.clipboard.writeText(\`${r.text}\`); update('${r.key}','use')">Copy</button>
<button onclick="update('${r.key}','good')">👍</button>
<button onclick="update('${r.key}','bad')">👎</button>
`).join("")}
</div>

<div class="card">
<h3>📝 Case Notes</h3>
<textarea id="note">${caseNote(p,s)}</textarea>
<button onclick="navigator.clipboard.writeText(document.getElementById('note').value)">Copy Notes</button>
</div>

${leadMode ? `<div class="card"><h3>🔒 Lead Mode</h3><div>Debug + scoring active</div></div>`:""}

`;

}

</script>

</body>
</html>
