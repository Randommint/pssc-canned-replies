<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSSC – Canned Reply Assistant v1.0</title>

<style>
  body {
    font-family: Segoe UI, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
  }

  h1 { margin-bottom: 10px; }

  input, textarea {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  .categories button {
    margin-right: 6px;
    margin-bottom: 10px;
    padding: 6px 10px;
    border: none;
    cursor: pointer;
  }

  .active {
    background:#0078d4;
    color:#fff;
  }

  .card {
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:6px;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
  }

  .title {
    font-weight:bold;
    margin-bottom:6px;
  }

  .when {
    font-size:12px;
    color:#555;
    margin-bottom:8px;
  }

  .body {
    background:#fafafa;
    padding:10px;
    border:1px solid #ddd;
    white-space:pre-wrap;
    font-size:13px;
    margin-bottom:8px;
  }

  .copy-btn {
    background:#0078d4;
    color:white;
    border:none;
    padding:8px 12px;
    cursor:pointer;
    border-radius:4px;
  }

  .copied {
    background:#107c10 !important;
  }

  .tag {
    background:#eef;
    padding:2px 8px;
    border-radius:10px;
    font-size:12px;
    margin-right:5px;
    display:inline-block;
  }
</style>

</head>

<body>

<h1>PSSC Canned Reply Assistant v1.0</h1>

<input id="search" placeholder="Search replies..." oninput="render()">

<div class="categories" id="categories"></div>

<div class="card">
  <div class="title">AI Suggestions (template recommendations only)</div>
  <div class="when">Paste case context — AI will suggest templates only.</div>

  <textarea id="context" rows="5"></textarea>

  <button class="copy-btn" onclick="suggest()">Suggest templates</button>

  <div id="suggestions"></div>
</div>

<div id="templates"></div>

<script>

// ✅ Fixed Templates Array (your missing issue)
const templates = [

  {
    category:"Follow Up",
    title:"Waiting on Customer – Initial Follow-Up",
    when:"Customer has not responded.",
    body:`Hello,

We’re still waiting on the requested information.

Please let us know how you'd like to proceed.

Regards,
Lenovo Support`
  },

  {
    category:"Closure",
    title:"Re-engagement Confirmation",
    when:"Case quiet",
    body:`Hello,

Please confirm if you still need assistance.

If not, we will close the case.

Regards,
Lenovo Support`
  },

  {
    category:"Closure",
    title:"Case Closed – No Response",
    when:"No reply",
    body:`Hello,

We are closing the case due to no response.

Please reopen if needed.

Regards,
Lenovo Support`
  },

  {
    category:"Scope",
    title:"Third-Party Ownership",
    when:"Outside Lenovo scope",
    body:`Hello,

This appears to be a third-party issue.

Please contact the appropriate vendor.

Regards,
Lenovo Support`
  },

  // ✅ YOUR ADDED TEMPLATES (fixed correctly inside array)
  {
    category:"Process",
    title:"RMA Requires Troubleshooting",
    when:"RMA requested early",
    body:`Hello,

We need to complete troubleshooting before replacement eligibility.

Regards,
Lenovo Support`
  },

  {
    category:"Follow Up",
    title:"Monitoring Confirmation",
    when:"System stable",
    body:`Hello,

Please monitor for 24–48 hours.

Let us know if issue returns.

Regards,
Lenovo Support`
  }

];

// ✅ Improved Signals (more tolerant)
const signals = {
  "Waiting on Customer – Initial Follow-Up": ["no response","waiting","not responding","logs","info"],
  "Re-engagement Confirmation": ["check","still need","confirm"],
  "Case Closed – No Response": ["close","closing","no reply"],
  "Third-Party Ownership": ["google","zoom","teams","third","vendor"],
  "RMA Requires Troubleshooting": ["rma","replace","replacement"],
  "Monitoring Confirmation": ["monitor","stable","observe"]
};

let activeCategory = "All";

// ✅ Copy function
function copyText(btn,text){
  navigator.clipboard.writeText(text);
  btn.textContent="Copied ✓";
  btn.classList.add("copied");
  setTimeout(()=>{btn.textContent="Copy";btn.classList.remove("copied");},1500);
}

// ✅ Render Templates
function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const list=document.getElementById("templates");
  list.innerHTML="";

  templates.forEach(t=>{
    if (activeCategory==="All"||t.category===activeCategory) {
      if (t.title.toLowerCase().includes(q) || t.body.toLowerCase().includes(q)) {

        list.innerHTML+=`
        <div class="card">
          <div class="title">${t.title}</div>
          <div class="when">${t.when}</div>
          <div class="body">${t.body}</div>
          <button class="copy-btn" onclick="copyText(this,\`${t.body}\`)">Copy</button>
        </div>`;
      }
    }
  });
}

// ✅ Categories
function renderCategories(){
  const cats=["All",...new Set(templates.map(t=>t.category))];
  const c=document.getElementById("categories");
  c.innerHTML="";

  cats.forEach(cat=>{
    c.innerHTML+=`<button class="${cat===activeCategory?'active':''}" onclick="activeCategory='${cat}';renderCategories();render();">${cat}</button>`;
  });
}

// ✅ AI Suggestion (fixed logic)
function suggest(){
  const ctx=document.getElementById("context").value.toLowerCase();
  const out=document.getElementById("suggestions");

  out.innerHTML="<h3>Top Suggestions</h3>";

  let results = templates.map(t=>{
    let score=0;
    let hits=[];

    (signals[t.title]||[]).forEach(k=>{
      if (ctx.includes(k)) {
        score++;
        hits.push(k);
      }
    });

    return {...t, score, hits};
  });

  let filtered = results.filter(r=>r.score>0).sort((a,b)=>b.score-a.score).slice(0,3);

  if(filtered.length===0){
    out.innerHTML+="<p>No match — add more context</p>";
    return;
  }

  filtered.forEach(t=>{
    out.innerHTML+=`
    <div class="card">
      <div class="title">${t.title}</div>
      <div class="when">Matched: ${t.hits.map(h=>`<span class="tag">${h}</span>`).join("")}</div>
      <div class="body">${t.body}</div>
      <button class="copy-btn" onclick="copyText(this,\`${t.body}\`)">Copy</button>
    </div>
    `;
  });
}

// ✅ init
renderCategories();
render();

</script>

</body>
</html>
