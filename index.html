<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSSC MVP Assistant</title>

<style>
body { font-family: Segoe UI; background:#0f172a; color:white; margin:0; padding:20px;}
.chat { max-width:800px; margin:auto;}
.msg { padding:12px; margin:10px 0; border-radius:10px;}
.user { background:#1e293b; text-align:right;}
.ai { background:#111827;}
input, textarea {
  width:100%; padding:10px; margin-top:10px;
  border-radius:8px; border:none;
}
button {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#6366f1;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.template {
  background:#1f2937;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
}
.copy-btn {
  margin-top:6px;
  padding:6px;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="chat" id="chat">

<div class="msg ai">
<strong>MVP:</strong>  
Hey 👋 I’m MVP — your support co-pilot.  
Drop a case summary and I’ll suggest the best move.
</div>

</div>

<textarea id="input" placeholder="Paste case context..."></textarea>
<button onclick="send()">Ask MVP</button>

<script>

const templates = [
{
title:"Waiting on Customer",
body:`We’re waiting on your response to proceed. Please provide the requested info.`
},
{
title:"Re-engagement",
body:`Do you still need assistance? If not we’ll close this case.`
},
{
title:"Close - No Response",
body:`We are closing the case due to inactivity.`
},
{
title:"Third Party",
body:`This issue falls outside Lenovo scope and needs vendor support.`
},
{
title:"RMA Required Troubleshooting",
body:`We need troubleshooting completed before replacement approval.`
}
];

function send(){
  const txt = document.getElementById("input").value.toLowerCase();
  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${txt}</div>`;

  let response = "";
  let matches = [];

  if(txt.includes("no response") || txt.includes("waiting")){
    response = "Looks like we're waiting on the customer.";
    matches.push(templates[0], templates[1]);
  }
  else if(txt.includes("close")){
    response = "Seems like this can be closed cleanly.";
    matches.push(templates[2]);
  }
  else if(txt.includes("google") || txt.includes("teams") || txt.includes("zoom")){
    response = "This looks like a third-party platform issue.";
    matches.push(templates[3]);
  }
  else if(txt.includes("replace") || txt.includes("rma")){
    response = "We shouldn’t replace yet — troubleshooting first.";
    matches.push(templates[4]);
  }
  else {
    response = "Hmm… this looks like a follow-up situation.";
    matches.push(templates[0]);
  }

  let html = `<div class="msg ai"><strong>MVP:</strong><br>${response}<br><br>`;

  matches.forEach(t => {
    html += `
    <div class="template">
      <strong>${t.title}</strong><br>
      ${t.body}
      <button class="copy-btn" onclick="copyText(\`${t.body}\`)">Copy</button>
    </div>`;
  });

  html += "</div>";

  chat.innerHTML += html;
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

</script>

</body>
</html>
