<!DOCTYPE html>
<html>
<head>
<title>MVP – Frostbyte Assistant</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  padding: 20px;
  animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1;}
}

.chat-box {
  max-width: 950px;
  margin:auto;
}

input {
  width:75%;
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:14px;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:#0f172a;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:#0ea5e9;
  transform: scale(1.05);
}

.card {
  background:#1e293b;
  padding:18px;
  margin-top:15px;
  border-radius:12px;
  border-left:4px solid #38bdf8;
  animation: fadeIn 0.5s ease-in;
  transition:0.2s;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow:0px 8px 20px rgba(56,189,248,0.2);
}

textarea {
  width:100%;
  height:120px;
  margin-top:10px;
  border-radius:8px;
  padding:10px;
  background:#f1f5f9;
  color:#0f172a;
}

.meta {
  margin-top:6px;
}

h2 {
  color:#38bdf8;
}

</style>
</head>

<body>

<div class="chat-box">
<h2>❄️ MVP Frostbyte Assistant</h2>

<input id="input" placeholder="Paste case details here..." />
<button onclick="run()">Analyze</button>

<div id="out"></div>
</div>

<script>

// PARSER
function parse(t){
 return {
  ticket:(t.match(/(case|ticket)[#:]?\s*([a-zA-Z0-9]+)/i)||[])[2]||"N/A",
  serial:(t.match(/(serial|sn)[#:]?\s*([a-zA-Z0-9]+)/i)||[])[2]||"N/A",
  email:(t.match(/[^\s]+@[^\s]+/i)||[])[0]||"N/A",
  text:t.toLowerCase()
 }
}

// ANALYSIS
function analyze(t){
 return {
  logs:t.includes("log"),
  wait:t.includes("not responding"),
  hw:t.includes("power")||t.includes("boot"),
  third:t.includes("teams")||t.includes("zoom"),
  rma:t.includes("replace")
 }
}

// CX FRIENDLY REPLIES ✅
function replies(s){

 return [

`Hello,

Thank you for reaching out — I completely understand how this can be frustrating, and I appreciate your patience while we work through it.

To help us move forward, could you please share the requested logs or any additional details when you have a moment? Once we have that, we’ll review everything and continue troubleshooting right away.

Looking forward to your update,
Lenovo Support`,

`Hello,

Just checking in on your case — I wanted to follow up and see if you had a chance to review our previous request.

Whenever you're ready, please share the requested information so we can continue working toward a resolution. If we don’t hear back, we may temporarily close the case, but we’re always here to pick things back up when you're available.

Thank you again,
Lenovo Support`,

`Hello,

I understand your concern regarding the issue, and we’re here to help get this resolved as quickly as possible.

At this stage, we’ll continue working through troubleshooting steps and reviewing the findings. If necessary, we can escalate internally after we’ve gathered the required information.

Please share any additional details when available — we’ll take it from there.

Thank you,
Lenovo Support`

 ];
}

// CHECKLIST
function checklist(s){
 let c=[
 "✔ Confirm serial number",
 "✔ Confirm customer email"
 ];
 if(s.logs){
  c.push("🟡 Provide logs");
  c.push("🟡 Provide timestamp of issue");
 }
 if(s.hw){
  c.push("🟡 Provide photo/video of issue");
 }
 return c;
}

// GUIDANCE
function actions(s){
 let a=[];
 if(s.logs)a.push("Request logs and confirm access");
 if(s.hw)a.push("Check power, cables, reboot");
 if(s.third)a.push("Isolate app vs system");
 if(s.wait)a.push("Send follow-up + closure expectation");
 if(s.rma)a.push("DO NOT promise replacement");

 if(a.length===0) a.push("Continue structured troubleshooting");

 return a;
}

// CASE NOTES
function notes(p,s){
 return `=== CASE NOTE ===

Case: ${p.ticket}
Serial: ${p.serial}
Email: ${p.email}

Issue: ${s.hw?"Hardware":"General"}

Actions:
• Initial review complete
• Awaiting more info

Next Step:
Continue troubleshooting
`;
}

// MAIN
function run(){

 let raw=document.getElementById("input").value;
 let p=parse(raw);
 let s=analyze(p.text);

 document.getElementById("out").innerHTML=`

<div class="card">
<h3>📄 Case Overview</h3>
<div class="meta">Case: ${p.ticket}</div>
<div class="meta">Serial: ${p.serial}</div>
<div class="meta">Email: ${p.email}</div>
</div>

<div class="card">
<h3>📋 What I Need From Customer</h3>
${checklist(s).map(x=>`<div>${x}</div>`).join("")}
</div>

<div class="card">
<h3>🧭 Guided Actions</h3>
${actions(s).map(x=>`<div>• ${x}</div>`).join("")}
</div>

<div class="card">
<h3>📧 Suggested Replies</h3>
${replies(s).map(r=>`
<textarea>${r}</textarea>
<button onclick="navigator.clipboard.writeText(\`${r}\`)">Copy</button>
`).join("")}
</div>

<div class="card">
<h3>📝 Case Notes</h3>
<textarea>${notes(p,s)}</textarea>
<button onclick="navigator.clipboard.writeText(\`${notes(p,s)}\`)">Copy Notes</button>
</div>
`
}

</script>

</body>
</html>
